version: "3.9"
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - redis
      - db

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    command: streamlit run app/streamlit.py --server.port 8501 --server.address 0.0.0.0
    environment:
      API_BASE_URL: http://web:8081
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    depends_on:
      - web

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A app.tasks.analyze:celery_app worker --loglevel=info
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - redis
      - db

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  db:
    image: postgres:13
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: code_review
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
